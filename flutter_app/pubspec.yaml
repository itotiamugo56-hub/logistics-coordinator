name: ministry_of_repentance
description: Find verified Ministry of Repentance branches worldwide - offline-capable branch locator for members
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Secure Storage (for clergy authentication only)
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # Image picker for photo uploads
  image_picker: ^1.0.7
  
  # Maps (Leaflet-based, works on web + mobile)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Location & Permissions
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  
  # Geocoding (convert address to coordinates)
  geocoding: ^3.0.0
  
  # Networking
  http: ^1.2.0
  
  # Utilities
  url_launcher: ^6.3.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.2
  
  # Local Database (offline-first)
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.5.3
  
  # Motion & UI Enhancements
  flutter_hooks: ^0.20.5
  recase: ^4.1.0
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true