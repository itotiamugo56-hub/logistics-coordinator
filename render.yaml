# render.yaml
services:
  - type: web
    name: zero-trust-backend
    runtime: image
    repo: https://github.com/YOUR_USERNAME/zero-trust-logistics
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: main  # or your default branch name
    plan: starter  # or free for testing
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zero-trust-db
          property: connectionString
      - key: RUST_LOG
        value: info
      - key: RUST_BACKTRACE
        value: full
    healthCheckPath: /health
    autoDeploy: true
    ports:
      - port: 8080
        protocol: http

# If you need a database (uncomment and configure)
# databases:
#   - name: zero-trust-db
#     plan: starter
#     databaseName: zero_trust_logistics
#     ipAllowList: []  # Allow all connections (restrict in production)